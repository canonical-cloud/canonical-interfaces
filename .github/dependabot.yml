version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
  # NOTE: generated/rust-wasm is an AUTOGENERATED crate — its dependency versions
  # live in src/generate.mjs, not in a hand-maintained manifest. Do NOT point
  # dependabot at it: bumping generated/rust-wasm/Cargo.toml directly makes
  # `node src/generate.mjs --check` fail (the generator still emits the old
  # version). Bump tsify/wasm-bindgen in src/generate.mjs and regenerate instead.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
